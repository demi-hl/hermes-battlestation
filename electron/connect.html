<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Connect to your Hermes</title>
<style>
  :root {
    --bg: #041c1c;
    --peach: #ffe6cb;
    --peach-dim: rgba(255, 230, 203, 0.62);
    --peach-faint: rgba(255, 230, 203, 0.14);
    --line: rgba(255, 230, 203, 0.22);
    --danger: #ff9b87;
  }
  /* Real brand fonts (same files the dashboard ships). Paths are relative to
     electron/connect.html -> ../public/fonts so file:// loads them directly. */
  @font-face {
    font-family: "Collapse";
    font-weight: 300;
    src: url("./fonts/Collapse-Light.woff2") format("woff2");
    font-display: swap;
  }
  @font-face {
    font-family: "Collapse";
    font-weight: 400;
    src: url("./fonts/Collapse-Regular.woff2") format("woff2");
    font-display: swap;
  }
  @font-face {
    font-family: "Collapse";
    font-weight: 700;
    src: url("./fonts/Collapse-Bold.woff2") format("woff2");
    font-display: swap;
  }
  @font-face {
    font-family: "Mondwest";
    font-weight: 400;
    src: url("./fonts/Mondwest-Regular.woff2") format("woff2");
    font-display: swap;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--peach);
    font-family: "Collapse", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
    user-select: none;
    padding: 32px;
  }
  .card { width: 100%; max-width: 460px; }
  .brand {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 28px;
  }
  .brand .mark {
    width: 22px; height: 22px; border: 2px solid var(--peach);
    border-radius: 6px; transform: rotate(45deg);
  }
  .brand .word {
    font-family: "Mondwest", "Collapse", serif;
    font-size: 19px; letter-spacing: 3.6px; font-weight: 400;
  }
  h1 {
    font-family: "Mondwest", "Collapse", serif;
    font-size: 28px; font-weight: 400; line-height: 1.2;
    margin-bottom: 12px;
  }
  p.lead {
    font-size: 13px; line-height: 1.6; color: var(--peach-dim);
    margin-bottom: 24px;
  }
  p.lead code {
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
    font-size: 12px; color: var(--peach);
  }
  label { display: block; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--peach-dim); margin-bottom: 8px; }
  input {
    width: 100%; background: transparent; border: 1px solid var(--line);
    border-radius: 10px; padding: 14px 14px; color: var(--peach);
    font-family: "Collapse", system-ui, sans-serif; font-size: 13px; outline: none;
    -webkit-user-select: text; user-select: text;
    transition: border-color 140ms ease;
  }
  input::placeholder { color: rgba(255, 230, 203, 0.32); }
  input:focus { border-color: var(--peach); }
  .field { margin-bottom: 18px; }
  button.connect {
    width: 100%; margin-top: 6px; height: 50px;
    background: var(--peach); color: var(--bg);
    border: none; border-radius: 10px;
    font-family: "Mondwest", "Collapse", serif; font-size: 17px; font-weight: 400;
    letter-spacing: 0.4px; cursor: pointer;
    transition: opacity 140ms ease;
  }
  button.connect:hover { opacity: 0.9; }
  button.connect:disabled { opacity: 0.4; cursor: default; }
  .error { color: var(--danger); font-size: 12px; line-height: 1.5; min-height: 18px; margin-top: 14px; }
  .local {
    margin-top: 26px; padding-top: 22px; border-top: 1px solid var(--peach-faint);
    text-align: center;
  }
  .local a {
    color: var(--peach-dim); font-size: 12px; text-decoration: none;
    border-bottom: 1px solid var(--line); padding-bottom: 2px; cursor: pointer;
  }
  .local a:hover { color: var(--peach); }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="mark"></div>
      <div class="word">BATTLESTATION</div>
    </div>
    <h1>Connect to your Hermes</h1>
    <p class="lead">Paste a pairing link from your box (run <code>npm run pair</code> on it). Same profiles and sessions, mirrored across every device. Nothing is baked into this app.</p>

    <div class="field">
      <label for="pair">Pairing link</label>
      <input id="pair" type="text" autocomplete="off" spellcheck="false"
        placeholder="battlestation://connect?url=...&token=..." />
    </div>

    <button class="connect" id="go">Connect</button>
    <div class="error" id="err"></div>

    <div class="local">
      <a id="useLocal">Use a local server on this machine instead</a>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const pair = $("pair");
    const err = $("err");

    function parsePairing(raw) {
      const s = (raw || "").trim();
      if (!s) return null;
      // battlestation://connect?url=...&token=...
      // https://box/?token=...   (url is the origin)
      try {
        if (s.startsWith("battlestation://")) {
          const q = new URL(s).searchParams;
          const url = (q.get("url") || "").trim();
          const token = (q.get("token") || "").trim();
          return { url, token };
        }
        const u = new URL(s.includes("://") ? s : "https://" + s);
        const token = (u.searchParams.get("token") || "").trim();
        const url = u.origin;
        return { url, token };
      } catch {
        return null;
      }
    }

    async function go() {
      err.textContent = "";
      const parsed = parsePairing(pair.value);
      if (!parsed || !parsed.url) {
        err.textContent = "That doesn't look like a pairing link. Run npm run pair on your box and paste the link.";
        return;
      }
      $("go").disabled = true;
      try {
        const res = await window.battlestation.connect(parsed);
        if (res && res.ok === false) {
          err.textContent = res.error || "Could not connect. Check the link and that the box is reachable.";
          $("go").disabled = false;
        }
        // on success the main process swaps the window to the dashboard
      } catch (e) {
        err.textContent = String(e && e.message ? e.message : e);
        $("go").disabled = false;
      }
    }

    $("go").addEventListener("click", go);
    pair.addEventListener("keydown", (e) => { if (e.key === "Enter") go(); });
    $("useLocal").addEventListener("click", async () => {
      $("go").disabled = true;
      try { await window.battlestation.useLocal(); } catch (e) { err.textContent = String(e); $("go").disabled = false; }
    });

    (async () => {
      try {
        const cur = await window.battlestation.current();
        if (cur && cur.url) pair.value = cur.url;
      } catch {}
      pair.focus();
    })();
  </script>
</body>
</html>
