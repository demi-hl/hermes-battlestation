<svg xmlns="http://www.w3.org/2000/svg" width="400" height="346" viewBox="0 0 400 346">
  <defs>
    <!-- Dark base background -->
    <rect id="bg" width="400" height="346" fill="#0d1117"/>

    <!-- Hermes Wing motif - single stylized wing/caduceus element -->
    <g id="hermes-wing">
      <!-- Wing feather arcs -->
      <path d="M0,0 C8,-6 16,-4 20,2 C16,0 8,-2 0,0Z" fill="none" stroke="#134e4a" stroke-width="0.6"/>
      <path d="M2,3 C12,-4 22,-2 28,5 C22,2 12,0 2,3Z" fill="none" stroke="#0d9488" stroke-width="0.5"/>
      <path d="M4,6 C16,-2 28,1 36,9 C28,5 16,3 4,6Z" fill="none" stroke="#115e59" stroke-width="0.5"/>
      <path d="M6,9 C20,0 34,4 44,13 C34,8 20,6 6,9Z" fill="none" stroke="#14b8a6" stroke-width="0.4"/>
      <path d="M8,12 C24,2 40,7 52,17 C40,11 24,9 8,12Z" fill="none" stroke="#0d9488" stroke-width="0.4"/>
      <path d="M10,15 C28,5 46,10 60,21 C46,14 28,12 10,15Z" fill="none" stroke="#134e4a" stroke-width="0.4"/>
    </g>

    <!-- Mirror wing (for caduceus pairs) -->
    <g id="hermes-wing-mirror">
      <path d="M0,0 C-8,-6 -16,-4 -20,2 C-16,0 -8,-2 0,0Z" fill="none" stroke="#134e4a" stroke-width="0.6"/>
      <path d="M-2,3 C-12,-4 -22,-2 -28,5 C-22,2 -12,0 -2,3Z" fill="none" stroke="#0d9488" stroke-width="0.5"/>
      <path d="M-4,6 C-16,-2 -28,1 -36,9 C-28,5 -16,3 -4,6Z" fill="none" stroke="#115e59" stroke-width="0.5"/>
      <path d="M-6,9 C-20,0 -34,4 -44,13 C-34,8 -20,6 -6,9Z" fill="none" stroke="#14b8a6" stroke-width="0.4"/>
      <path d="M-8,12 C-24,2 -40,7 -52,17 C-40,11 -24,9 -8,12Z" fill="none" stroke="#0d9488" stroke-width="0.4"/>
      <path d="M-10,15 C-28,5 -46,10 -60,21 C-46,14 -28,12 -10,15Z" fill="none" stroke="#134e4a" stroke-width="0.4"/>
    </g>

    <!-- Caduceus staff + wings - central motif -->
    <g id="caduceus">
      <!-- Staff -->
      <line x1="0" y1="0" x2="0" y2="40" stroke="#1a5b54" stroke-width="0.8"/>
      <!-- Wings spread -->
      <use href="#hermes-wing-mirror" x="0" y="-4"/>
      <use href="#hermes-wing" x="0" y="-4"/>
      <!-- Top orb -->
      <circle cx="0" cy="-2" r="2.5" fill="none" stroke="#14b8a6" stroke-width="0.5" opacity="0.6"/>
      <!-- Serpentine waves wrapping staff -->
      <path d="M1,5 C5,10 -5,15 1,20 C5,25 -5,30 1,35" fill="none" stroke="#0d9488" stroke-width="0.4" opacity="0.5"/>
      <path d="M-1,5 C-5,10 5,15 -1,20 C-5,25 5,30 -1,35" fill="none" stroke="#0d9488" stroke-width="0.4" opacity="0.5"/>
    </g>

    <!-- Hexagonal tile -->
    <g id="hexagon">
      <polygon points="0,-17 15,-8.5 15,8.5 0,17 -15,8.5 -15,-8.5"
               fill="none" stroke="#134e4a" stroke-width="0.5" opacity="0.4"/>
      <polygon points="0,-13 11.5,-6.5 11.5,6.5 0,13 -11.5,6.5 -11.5,-6.5"
               fill="none" stroke="#0d9488" stroke-width="0.3" opacity="0.25"/>
    </g>

    <!-- Diamond / rhombus -->
    <g id="diamond">
      <polygon points="0,-10 8,0 0,10 -8,0"
               fill="none" stroke="#115e59" stroke-width="0.4" opacity="0.35"/>
    </g>

    <!-- Chevron/broken-line circuit detail -->
    <g id="circuit-path">
      <polyline points="0,0 6,0 6,-6 12,-6 12,0 18,0"
                fill="none" stroke="#14b8a6" stroke-width="0.35" opacity="0.25"/>
      <circle cx="18" cy="0" r="0.8" fill="#14b8a6" opacity="0.3"/>
    </g>
  </defs>

  <!-- Dark background -->
  <use href="#bg"/>

  <!--
    Tiling layout: 400x346 tile
    ≈3 caduceus columns (every ~133px), 8 rows (every ~43px), staggered
    Hexagons fill interstitial space
    Diamonds accent at cross-points
    Circuit paths sprinkled for tech feel
  -->

  <!-- Row 1: Caduceus primary row -->
  <use href="#caduceus" x="50" y="43" opacity="0.35"/>
  <use href="#caduceus" x="200" y="43" opacity="0.3"/>
  <use href="#caduceus" x="350" y="43" opacity="0.35"/>

  <!-- Row 2: offset caduceus -->
  <use href="#caduceus" x="125" y="86" opacity="0.3"/>
  <use href="#caduceus" x="275" y="86" opacity="0.35"/>

  <!-- Row 3 -->
  <use href="#caduceus" x="50" y="130" opacity="0.35"/>
  <use href="#caduceus" x="200" y="130" opacity="0.3"/>
  <use href="#caduceus" x="350" y="130" opacity="0.35"/>

  <!-- Row 4 -->
  <use href="#caduceus" x="125" y="173" opacity="0.3"/>
  <use href="#caduceus" x="275" y="173" opacity="0.35"/>

  <!-- Row 5 -->
  <use href="#caduceus" x="50" y="216" opacity="0.35"/>
  <use href="#caduceus" x="200" y="216" opacity="0.3"/>
  <use href="#caduceus" x="350" y="216" opacity="0.35"/>

  <!-- Row 6 -->
  <use href="#caduceus" x="125" y="259" opacity="0.3"/>
  <use href="#caduceus" x="275" y="259" opacity="0.35"/>

  <!-- Row 7 -->
  <use href="#caduceus" x="50" y="303" opacity="0.35"/>
  <use href="#caduceus" x="200" y="303" opacity="0.3"/>
  <use href="#caduceus" x="350" y="303" opacity="0.35"/>

  <!-- Hexagons at interstitial positions -->
  <!-- Around row 1 caducei -->
  <use href="#hexagon" x="125" y="30" opacity="0.3"/>
  <use href="#hexagon" x="275" y="30" opacity="0.3"/>

  <!-- Around row 2 -->
  <use href="#hexagon" x="50" y="73" opacity="0.25"/>
  <use href="#hexagon" x="200" y="73" opacity="0.25"/>
  <use href="#hexagon" x="350" y="73" opacity="0.25"/>

  <!-- Around row 3 -->
  <use href="#hexagon" x="125" y="117" opacity="0.3"/>
  <use href="#hexagon" x="275" y="117" opacity="0.3"/>

  <!-- Around row 4 -->
  <use href="#hexagon" x="50" y="160" opacity="0.25"/>
  <use href="#hexagon" x="200" y="160" opacity="0.25"/>
  <use href="#hexagon" x="350" y="160" opacity="0.25"/>

  <!-- Around row 5 -->
  <use href="#hexagon" x="125" y="203" opacity="0.3"/>
  <use href="#hexagon" x="275" y="203" opacity="0.3"/>

  <!-- Around row 6 -->
  <use href="#hexagon" x="50" y="246" opacity="0.25"/>
  <use href="#hexagon" x="200" y="246" opacity="0.25"/>
  <use href="#hexagon" x="350" y="246" opacity="0.25"/>

  <!-- Around row 7 -->
  <use href="#hexagon" x="125" y="290" opacity="0.3"/>
  <use href="#hexagon" x="275" y="290" opacity="0.3"/>

  <!-- Diamonds at cross-point grid intersections -->
  <g opacity="0.2">
    <use href="#diamond" x="85" y="60"/>
    <use href="#diamond" x="160" y="60"/>
    <use href="#diamond" x="235" y="60"/>
    <use href="#diamond" x="310" y="60"/>

    <use href="#diamond" x="38" y="103"/>
    <use href="#diamond" x="113" y="103"/>
    <use href="#diamond" x="188" y="103"/>
    <use href="#diamond" x="263" y="103"/>
    <use href="#diamond" x="338" y="103"/>

    <use href="#diamond" x="85" y="146"/>
    <use href="#diamond" x="160" y="146"/>
    <use href="#diamond" x="235" y="146"/>
    <use href="#diamond" x="310" y="146"/>

    <use href="#diamond" x="38" y="190"/>
    <use href="#diamond" x="113" y="190"/>
    <use href="#diamond" x="188" y="190"/>
    <use href="#diamond" x="263" y="190"/>
    <use href="#diamond" x="338" y="190"/>

    <use href="#diamond" x="85" y="233"/>
    <use href="#diamond" x="160" y="233"/>
    <use href="#diamond" x="235" y="233"/>
    <use href="#diamond" x="310" y="233"/>

    <use href="#diamond" x="38" y="276"/>
    <use href="#diamond" x="113" y="276"/>
    <use href="#diamond" x="188" y="276"/>
    <use href="#diamond" x="263" y="276"/>
    <use href="#diamond" x="338" y="276"/>

    <use href="#diamond" x="85" y="319"/>
    <use href="#diamond" x="160" y="319"/>
    <use href="#diamond" x="235" y="319"/>
    <use href="#diamond" x="310" y="319"/>
  </g>

  <!-- Circuit path traces scattered for tech feel -->
  <g opacity="0.2">
    <use href="#circuit-path" x="15" y="15"/>
    <use href="#circuit-path" x="100" y="95" transform="rotate(90,109,95)"/>
    <use href="#circuit-path" x="290" y="140"/>
    <use href="#circuit-path" x="40" y="250" transform="rotate(45,49,250)"/>
    <use href="#circuit-path" x="320" y="200" transform="rotate(-45,329,200)"/>
    <use href="#circuit-path" x="170" y="300"/>
    <use href="#circuit-path" x="360" y="330" transform="rotate(90,369,330)"/>
    <use href="#circuit-path" x="80" y="170" transform="rotate(180,89,170)"/>
    <use href="#circuit-path" x="240" y="55" transform="rotate(-90,249,55)"/>
  </g>

  <!-- Subtle hexagon grid lines forming the underlying mesh -->
  <g stroke="#0d9488" stroke-width="0.2" opacity="0.08">
    <!-- Horizontal mesh lines -->
    <line x1="0" y1="43" x2="400" y2="43"/>
    <line x1="0" y1="86" x2="400" y2="86"/>
    <line x1="0" y1="130" x2="400" y2="130"/>
    <line x1="0" y1="173" x2="400" y2="173"/>
    <line x1="0" y1="216" x2="400" y2="216"/>
    <line x1="0" y1="259" x2="400" y2="259"/>
    <line x1="0" y1="303" x2="400" y2="303"/>
    <!-- Vertical guides -->
    <line x1="50" y1="0" x2="50" y2="346"/>
    <line x1="125" y1="0" x2="125" y2="346"/>
    <line x1="200" y1="0" x2="200" y2="346"/>
    <line x1="275" y1="0" x2="275" y2="346"/>
    <line x1="350" y1="0" x2="350" y2="346"/>
  </g>
</svg>
